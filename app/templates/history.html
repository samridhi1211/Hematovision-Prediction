<!DOCTYPE html>
<html>
<head>
    <title>History</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1d2671, #c33764);
            color: white;
        }

        h1 {
            text-align: center;
            margin-top: 30px;
        }

        .container {
            width: 90%;
            margin: 30px auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            color: black;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #1d2671;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        tr:hover {
            background: #ddd;
        }

        img {
            width: 100px;
            border-radius: 8px;
        }

        .nav {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .nav a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .nav a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/predict">Predict</a>
    <a href="/logout">Logout</a>
</div>

<h1>📜 Prediction History</h1>

<div class="container">

<table>
    <tr>
        <th>User</th>
        <th>Image</th>
        <th>Prediction</th>
        <th>Time</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[1] }}</td>
        <td><img src="{{ row[2] }}"></td>
        <td><b>{{ row[3] }}</b></td>
        <td>{{ row[4] }}</td>
    </tr>
    {% endfor %}
</table>

</div>

</body>
</html>
