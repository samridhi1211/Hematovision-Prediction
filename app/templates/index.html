<!DOCTYPE html>
<html>
<head>
    <title>Blood Cell Predictor</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #1d2671, #c33764);
            color: white;
            text-align: center;
            padding-top: 80px;
        }

        .card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        }

        .btn-custom {
            background: #1d2671;
            color: white;
        }

        .btn-custom:hover {
            background: #c33764;
        }
    </style>
</head>

<body>

    <h1 class="mb-4">🧬 Blood Cell Detection System</h1>

    <div class="card">

        <h4>Upload Image</h4>

        <form method="POST" enctype="multipart/form-data">
            <input class="form-control mb-3" type="file" name="file" required>
            <button class="btn btn-custom w-100">Predict</button>
        </form>

        {% if result %}
            <hr>
            <h5>Prediction:</h5>
            <h3 class="text-success">{{ result }}</h3>
            <img src="{{ img_path }}" class="img-fluid mt-3">
        {% endif %}

    </div>

</body>
</html>
